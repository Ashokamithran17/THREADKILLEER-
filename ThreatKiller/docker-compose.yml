version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: insiderguard_db
    environment:
      POSTGRES_USER: insiderguard_user
      POSTGRES_PASSWORD: insiderguard_secure_password123
      POSTGRES_DB: insiderguard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insiderguard_user -d insiderguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insiderguard_backend
    environment:
      - DATABASE_URL=postgresql://insiderguard_user:insiderguard_secure_password123@db:5432/insiderguard_db
      - JWT_SECRET=insiderguard_jwt_super_secret_key_2026_change_me
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insiderguard_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
